name: Build iOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App (Archive)
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: npx cap sync ios

      - name: CocoaPods Install
        working-directory: frontend/ios/App
        run: pod install

      - name: Build Xcode Workspace
        working-directory: frontend/ios/App
        # Building without code signing to get a generic archive
        run: xcodebuild clean archive -workspace App.xcworkspace -scheme App -configuration Release -archivePath $PWD/build/App.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Zip Archive
        working-directory: frontend/ios/App
        run: zip -r build/App.xcarchive.zip build/App.xcarchive

      - name: Upload iOS Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App.xcarchive.zip
          path: frontend/ios/App/build/App.xcarchive.zip
          retention-days: 7
